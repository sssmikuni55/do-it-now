name: Nightly Notifications
on:
  schedule:
    - cron: '15 21 * * *' # 日本時間 06:15 (UTC 21:15)
    - cron: '0 12 * * *'  # 日本時間 21:00 (UTC 12:00)
  workflow_dispatch: # 手動実行用

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install @supabase/supabase-js web-push
      - name: Run Notification Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          if [ "${{ github.event.schedule }}" == "0 12 * * *" ]; then
            node scripts/send-notifications.js evening
          else
            node scripts/send-notifications.js morning
          fi
