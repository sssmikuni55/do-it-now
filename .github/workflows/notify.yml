name: Nightly/Hourly Notifications
on:
  schedule:
    - cron: '0 23 * * *' # 日本時間 08:00 (UTC 23:00)
    - cron: '0 * * * *'  # 1時間おき
  workflow_dispatch: # 手動実行用

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install @supabase/supabase-js web-push
      - name: Run Notification Script
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 23 * * *" ]; then
            node scripts/send-notifications.js morning
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            node scripts/send-notifications.js morning
          else
            node scripts/send-notifications.js overdue
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SCHEDULE: ${{ github.event.schedule }}
