name: Nightly/Hourly Notifications
on:
  schedule:
    - cron: '0 23 * * *' # 日本時間 08:00 (UTC 23:00)
    - cron: '0 * * * *'  # 1時間おき
  workflow_dispatch: # 手動実行用

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install @supabase/supabase-js web-push
      - name: Run Morning Summary
        if: github.event.schedule == '0 23 * * *'
        run: node scripts/send-notifications.js morning
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      - name: Run Overdue Alert
        if: github.event.schedule != '0 23 * * *'
        run: node scripts/send-notifications.js overdue
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
